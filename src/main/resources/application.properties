spring.application.name=LojaGames

spring.datasource.url=jdbc:h2:file:./data/lojagames-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.platform=h2

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always

jwt.secret=minha-chave-secreta-muito-comprida-para-desenvolvimento-jwt-token-auth
jwt.expiration=86400000

moderacao.palavras-proibidas=termo_ofensivo_1,termo_ofensivo_2,termo_obsceno_1,apologia_negativa_1
moderacao.worker.intervalo-ms=5000